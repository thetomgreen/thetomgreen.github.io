<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Real Bird or Fake? — Can you spot the made-up bird?</title>
  <meta name="description" content="Three birds. One is fake. Can you spot it? A fun bird trivia guessing game.">
  <meta property="og:title" content="Real Bird or Fake?">
  <meta property="og:description" content="Three birds. One is fake. Can you spot it?">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://realbirdorfake.com">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Real Bird or Fake?">
  <meta name="twitter:description" content="Three birds. One is fake. Can you spot it?">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐦</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a2a1a;
      color: #f0f0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      text-align: center;
      padding: 20px 16px 8px;
      background: #1a2a1a;
    }

    h1 {
      font-size: 2rem;
      color: #7ec87e;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #8aaa7a;
      margin-top: 2px;
    }

    .score-bar {
      display: flex;
      gap: 20px;
      justify-content: center;
      padding: 10px;
      font-size: 0.9rem;
      color: #aac8aa;
    }

    .score-bar span { font-weight: bold; color: #7ec87e; }

    #game-screen {
      width: 100%;
      max-width: 480px;
      padding: 8px 16px 24px;
      flex: 1;
    }

    .question {
      text-align: center;
      font-size: 1rem;
      color: #b0c8a0;
      margin: 8px 0 18px;
    }

    .bird-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bird-btn {
      background: #2a3d2a;
      border: 2px solid #3d5a3d;
      border-radius: 16px;
      padding: 18px 20px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .bird-btn:active { transform: scale(0.97); }

    .bird-btn .bird-name {
      font-size: 1.15rem;
      font-weight: 600;
      color: #e8f0e0;
      line-height: 1.3;
    }

    .bird-btn.correct {
      background: #1a4a2a;
      border-color: #4caf50;
      animation: pulse-green 0.4s ease;
    }

    .bird-btn.wrong   { background: #4a1a1a; border-color: #e05050; }
    .bird-btn.reveal-fake { background: #4a1a1a; border-color: #e05050; }
    .bird-btn.reveal-real { background: #1a4a2a; border-color: #4caf50; }
    .bird-btn:disabled { cursor: default; }

    @keyframes pulse-green {
      0%   { box-shadow: 0 0 0 0 rgba(76,175,80,0.4); }
      70%  { box-shadow: 0 0 0 10px rgba(76,175,80,0); }
      100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); }
    }

    .result-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .label-fake { color: #e05050; }
    .label-real { color: #4caf50; }

    /* RESULT PANEL */
    #result-panel {
      display: none;
      margin-top: 20px;
      background: #2a3d2a;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #3d5a3d;
    }

    .result-header {
      text-align: center;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .result-header.win  { background: #1a4a2a; color: #7ec87e; }
    .result-header.lose { background: #3a1a1a; color: #e07070; }

    .real-birds { display: flex; flex-direction: column; }

    .real-bird {
      padding: 14px 16px;
      border-top: 1px solid #3d5a3d;
    }

    .real-bird h3 {
      font-size: 1rem;
      color: #c8e0b8;
      margin-bottom: 10px;
    }

    .photo-wrap {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
      background: #1a2a1a;
      min-height: 160px;
      position: relative;
      overflow: hidden;
    }

    .photo-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a6a4a;
      font-size: 0.8rem;
    }

    .bird-photo {
      width: 100%;
      display: block;
      border-radius: 10px;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .bird-photo.loaded { opacity: 1; }

    .fun-fact {
      font-size: 0.82rem;
      color: #9ab88a;
      line-height: 1.5;
    }

    .next-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 16px auto;
      background: #4caf50;
      color: #0a1a0a;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .next-btn:active { background: #3d9140; }

    .streak {
      text-align: center;
      font-size: 0.82rem;
      color: #8aaa7a;
      padding-bottom: 8px;
    }

    .streak span { color: #f0c060; font-weight: bold; }

    .difficulty-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 10px 8px;
      font-size: 0.72rem;
      color: #5a7a5a;
    }

    .diff-pills {
      display: flex;
      gap: 2px;
    }

    .diff-btn {
      background: transparent;
      border: 1px solid #2d452d;
      border-radius: 10px;
      padding: 3px 9px;
      font-size: 0.70rem;
      font-weight: 600;
      color: #5a7a5a;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s ease;
    }

    .diff-btn.active {
      background: #2d452d;
      border-color: #3d5a3d;
      color: #9ab88a;
    }

    .diff-btn:active { opacity: 0.7; }

    .adaptive-label {
      font-size: 0.68rem;
      color: #5a7a5a;
    }
  </style>
</head>
<body>

<header>
  <h1>🐦 Real Bird or Fake?</h1>
  <p class="subtitle">One of these birds doesn't exist. Which one?</p>
</header>

<div class="score-bar">
  <div>Score: <span id="score">0</span></div>
  <div>Best streak: <span id="best-streak">0</span></div>
</div>

<div class="difficulty-bar">
  <span>Difficulty:</span>
  <div class="diff-pills">
    <button class="diff-btn" data-level="easy" onclick="setDifficulty('easy')">Easy</button>
    <button class="diff-btn" data-level="medium" onclick="setDifficulty('medium')">Med</button>
    <button class="diff-btn" data-level="hard" onclick="setDifficulty('hard')">Hard</button>
    <button class="diff-btn active" data-level="auto" onclick="setDifficulty('auto')">Auto</button>
  </div>
  <span class="adaptive-label" id="adaptive-label">(medium)</span>
</div>

<div id="game-screen">
  <p class="question">Tap the bird you think is <strong>made up</strong></p>
  <div class="bird-cards" id="bird-cards"></div>
  <div id="result-panel">
    <div class="result-header" id="result-header"></div>
    <div class="real-birds" id="real-birds-info"></div>
    <div class="streak" id="streak-display"></div>
    <button class="next-btn" onclick="nextRound()">Next bird →</button>
  </div>
</div>

<script src="birds.js"></script>
<script src="fake-names.js"></script>
<script src="game.js"></script>
</body>
</html>
