  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a2a1a;
      color: #f0f0e8;
      min-height: 100vh;
      display: flex;

    header {
      width: 100%;
      text-align: center;
      padding: 20px 16px 8px;

      font-size: 2rem;

    .question {

    .bird-btn {

    .bird-btn:active { transform: scale(0.97); }

      font-weight: 600;

      line-height: 1.3;

      animation: pulse-green 0.4s ease;
    }

    .bird-btn.wrong   { background: #4a1a1a; border-color: #e05050; }
    .bird-btn.reveal-fake { background: #4a1a1a; border-color: #e05050; }
    .bird-btn.reveal-real { background: #1a4a2a; border-color: #4caf50; }
    .bird-btn:disabled { cursor: default; }

    @keyframes pulse-green {
      0%   { box-shadow: 0 0 0 0 rgba(76,175,80,0.4); }
      70%  { box-shadow: 0 0 0 10px rgba(76,175,80,0); }
      100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); }

      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 6px;

      text-align: center;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .result-header.win  { background: #1a4a2a; color: #7ec87e; }
    .result-header.lose { background: #3a1a1a; color: #e07070; }

    .real-birds { display: flex; flex-direction: column; }

    .real-bird {
      padding: 14px 16px;
      border-top: 1px solid #3d5a3d;
    }

    .real-bird h3 {
      font-size: 1rem;
      color: #c8e0b8;
      margin-bottom: 10px;
    }

    .photo-wrap {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
      background: #1a2a1a;
      min-height: 160px;
      position: relative;
      overflow: hidden;
    }

    .photo-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a6a4a;
      font-size: 0.8rem;
    }

    .bird-photo {
      width: 100%;
      display: block;
      border-radius: 10px;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

      font-size: 0.82rem;
      color: #9ab88a;

      color: #0a1a0a;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .next-btn:active { background: #3d9140; }

    .streak {
      text-align: center;
      font-size: 0.82rem;
      color: #8aaa7a;
      padding-bottom: 8px;
    }

    .streak span { color: #f0c060; font-weight: bold; }

      background: transparent;
      border: 1px solid #2d452d;
      border-radius: 10px;

      cursor: pointer;
      -webkit-tap-highlight-color: transparent;

<body>

<header>
  <h1>🐦 Real Bird or Fake?</h1>
  <p class="subtitle">One of these birds doesn't exist. Which one?</p>
</header>

<div class="score-bar">
  <div>Score: <span id="score">0</span></div>
  <div>Best streak: <span id="best-streak">0</span></div>
</div>

<div class="difficulty-bar">
  <span>Difficulty:</span>
  <div class="diff-pills">
    <button class="diff-btn" data-level="easy" onclick="setDifficulty('easy')">Easy</button>
    <button class="diff-btn" data-level="medium" onclick="setDifficulty('medium')">Med</button>
    <button class="diff-btn" data-level="hard" onclick="setDifficulty('hard')">Hard</button>
    <button class="diff-btn active" data-level="auto" onclick="setDifficulty('auto')">Auto</button>
  </div>
  <span class="adaptive-label" id="adaptive-label">(medium)</span>
</div>

<div id="game-screen">
  <p class="question">Tap the bird you think is <strong>made up</strong></p>
  <div class="bird-cards" id="bird-cards"></div>

    <div class="result-header" id="result-header"></div>
    <div class="real-birds" id="real-birds-info"></div>
    <div class="streak" id="streak-display"></div>
    <button class="next-btn" onclick="nextRound()">Next bird →</button>
  </div>
</div>

<script>
// ── Difficulty settings ───────────────────────────────────────────────────────
// Difficulty controls the STYLE of fake name, not the length.
// All three lengths (short/medium/long) appear at every difficulty level.
//
// easy   → silly/funny names (Boingbird, Wobbly Flumpwren, Greater Giggly Noodlelark)
// medium → plausible invented names (Greysnipe, Dusky Thornwren, Pale-crowned Reedwarbler)
// hard   → convincing real-bird-pattern names (Yellow-naped Warbler, Lesser Rufous-fronted Pipit)

let selectedDifficulty = 'auto';
let adaptiveDifficulty = 'medium';
let recentResults = [];
let lastFakeStyle = 'auto';

function getStyle() {
  return selectedDifficulty === 'auto' ? adaptiveDifficulty : selectedDifficulty;
}

function setDifficulty(level) {
  selectedDifficulty = level;
  document.querySelectorAll('.diff-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.level === level);
  });
  updateAdaptiveLabel();
}

function updateAdaptiveDifficulty(correct) {
  recentResults.push(correct);
  if (recentResults.length > 5) recentResults.shift();
  if (recentResults.length < 3) return;
  const last3 = recentResults.slice(-3);
  const correct3 = last3.filter(Boolean).length;
  if (correct3 === 3) {
    if (adaptiveDifficulty === 'easy')        adaptiveDifficulty = 'medium';
    else if (adaptiveDifficulty === 'medium') adaptiveDifficulty = 'hard';
  } else if (correct3 <= 1) {
    if (adaptiveDifficulty === 'hard')        adaptiveDifficulty = 'medium';
    else if (adaptiveDifficulty === 'medium') adaptiveDifficulty = 'easy';
  }
  updateAdaptiveLabel();
}

function updateAdaptiveLabel() {
  const el = document.getElementById('adaptive-label');
  el.textContent = selectedDifficulty === 'auto' ? `(${adaptiveDifficulty})` : '';
}

// ── Fake name parts ──────────────────────────────────────────────────────────

// EASY: silly/funny — obviously made up
const SILLY = {
  shortPre: ['Boing','Flump','Wobble','Snork','Bumble','Splat','Squonk','Doodle',
             'Noodle','Twiddle','Fumble','Rumple','Bubble','Giggle','Wiggle',
             'Jiggle','Boggle','Blorp','Fizzle','Bibble','Wibble','Clonk','Honkle',
             'Plonk','Wuffle','Snibble','Flibble','Grumble','Tumble','Squibble',
             'Flooble','Zibble','Snuffler','Blorple','Yibble','Quibble','Snortle'],
  shortSuf: ['bird','finch','wren','chat','lark','beak','plop','wing','puff','bob',
             'flap','honk','bonk','toot','blorp','squeak','peep','clonk','wig',
             'boink','fizzer','doodler','bonker','noodler','blonker','squibble'],
  medAdj:   ['Wobbly','Giggly','Fluffy','Puffy','Fuzzy','Chubby','Grumpy','Sleepy',
             'Bouncy','Squishy','Bumbling','Tumbling','Shuffling','Waddling','Droopy',
             'Flappy','Sneezy','Doofy','Noodly','Blobby','Squiggly','Plonky',
             'Blundering','Lumpy','Honky','Sniffly','Boggle-eyed','Roly-poly',
             'Pudgy','Floopy','Snorting','Gurgling','Teetering','Flumping'],
  medNoun:  ['Boing','Flump','Splat','Squonk','Noodle','Doodle','Rumple','Bubble',
             'Wobble','Twiddle','Fumble','Giggle','Wiggle','Blorp','Fizzle','Bibble',
             'Honkle','Plonk','Squibble','Flibble','Wuffle','Zibble','Flooble',
             'Snortle','Yibble','Blorple','Quibble'],
  medSuf:   ['bird','finch','wren','chat','lark','puff','bob','honk','wig','peep',
             'noodler','bonker','doodler','wing','plonk','squibbler'],
  longScale:['Greater','Lesser','Common','Giant','Tiny','Enormous','Northern','Spotted',
             'Magnificent','Bumbling','Tremendous','Bewildering','Extraordinary'],
  longAdj:  ['Wobbly','Giggly','Fluffy','Chubby','Bouncy','Squishy','Doofy','Flappy',
             'Blotchy','Pudgy','Sneezy','Droopy','Noodly','Lumpy','Blobby','Honky',
             'Roly-poly','Boggle-eyed','Squiggly','Floopy','Teetering','Gurgling'],
  longNoun: ['Boing','Flump','Splat','Noodle','Doodle','Bubble','Wobble','Fizzle',
             'Honkle','Plonk','Squonk','Bibble','Wuffle','Blorp','Squibble','Snortle'],
  longSuf:  ['bird','finch','wren','lark','puff','honk','chat','wig','noodler','bonker'],
};

// MEDIUM: plausible invented names — all three lengths
const PLAUSIBLE = {
  shortPre: ['Grey','Marsh','Blotch','Fen','Dusk','Mud','Stone','Rust','Buff','Dun',
             'Brack','Mire','Tarn','Sedge','Crag','Silt','Heath','Moor','Peat','Holt',
             'Gorse','Brake','Holm','Knoll','Copse','Shale','Dale','Brae','Quag'],
  shortSuf: ['snipe','chat','wing','wren','finch','bird','bill','cap','lark','back',
             'duck','swift','tern','hawk','dive','creep','perch','brush'],
  medSimple:['Russet','Dusky','Pale','Rufous','Brown','Tawny','Sooty','Ashy',
             'Barred','Streaked','Slender','Speckled','Mottled','Dappled','Ochre',
             'Sallow','Dingy','Smudgy','Blotched','Grizzled'],
  medHyphen:['Short-billed','White-throated','Long-tailed','Red-faced','Dark-backed',
             'Thin-billed','Broad-winged','Deep-chested','Stout-legged','Sharp-winged'],
  medMod:   ['Thorn','Bell','Crow','Gap','Mud','Dust','Crest','Brush','Marsh','Stone',
             'Cliff','Reed','Fen','Clatter','Creep','Rattle','Gorse','Sedge','Mire',
             'Brake','Shale','Brack','Quag','Holt','Dale'],
  medType:  ['wren','chat','finch','bird','wing','warbler','creeper','runner','diver',
             'shrike','martin','swift','hawk','lark'],
  longColor:['Pale','Golden','Black','Rufous','White','Buff','Dusky','Russet','Streaked',
             'Barred','Spotted','Sooty','Ash','Ochre','Tawny','Smudgy','Grizzled'],
  longPart: ['crowned','browed','breasted','vented','winged','backed','capped','fronted',
             'bellied','throated','billed','rumped','tailed','naped','faced','shouldered'],
  longHab:  ['Dust','Whistle','Crest','Bell','Mud','Crown','Thorn','Creep','Marsh','Reed',
             'Cliff','Mire','Heath','Rattle','Gap','Sedge','Gorse','Brake','Dale','Shale'],
  longType: ['wren','finch','bird','chat','warbler','runner','shrike','diver','lark','hawk'],
  scale:    ['Lesser','Greater','Common','Northern','Southern','Eastern','Western','Spotted'],
};

// HARD: follows real bird naming conventions — subtle and convincing
// Three distinct formats, one per length:
//   short  → "Color-bodypart Type"            e.g. Rufous-bellied Warbler
//   medium → "Scale Color-bodypart Type"       e.g. Lesser Yellow-throated Flycatcher
//   long   → "Geographic Color-bodypart Type"  e.g. Himalayan Black-crowned Babbler
const SNEAKY = {
  color:    ['Yellow','Red','Black','White','Blue','Purple','Golden','Rufous','Chestnut',
             'Olive','Grey','Brown','Tawny','Orange','Cinnamon','Crimson','Indigo','Scarlet',
             'Buff','Ochre','Slate','Rusty','Sooty','Fulvous','Vinous','Isabelline',
             'Pale','Dark','Dusky','Ash','Ferruginous','Lavender','Umber'],
  bodyPart: ['crowned','throated','backed','winged','breasted','bellied','faced','headed',
             'capped','vented','rumped','tailed','billed','footed','cheeked','eared','browed',
             'fronted','collared','naped','shouldered','flanked','ringed','spotted','barred'],
  type:     ['Warbler','Tanager','Finch','Sparrow','Flycatcher','Vireo','Thrush','Wren',
             'Nuthatch','Kingfisher','Hummingbird','Hawk','Dove','Plover','Heron','Bunting',
             'Grosbeak','Swallow','Pipit','Babbler','Sunbird','Honeyeater','Manakin',
             'Trogon','Barbet','Woodpecker','Pitta','Monarch','Fantail','Laughingthrush',
             'Cisticola','Prinia','Bulbul','White-eye','Flowerpecker','Leafbird',
             'Chat','Robin','Redstart','Wheatear','Nightjar','Shortwing','Drongo'],
  scale:    ['Lesser','Greater','Common','Little','Slender','Pale','Plain','Streaked'],
  geo:      ['Eastern','Western','Northern','Southern','Eurasian','African','Asian',
             'American','Himalayan','Amazonian','Andean','Sumatran','Bornean',
             'Mountain','Forest','Highland','Coastal','Island','Desert','Marsh'],
};

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

const usedFakeNames = new Set();

function generateFakeName() {
  let name, attempts = 0;
  const style = getStyle();
  console.log('[DEBUG] generateFakeName called, style =', style, '| selectedDifficulty =', selectedDifficulty, '| adaptiveDifficulty =', adaptiveDifficulty);
  do {
    const len = Math.floor(Math.random() * 3); // 0=short, 1=medium, 2=long
    if (style === 'easy') {
      if (len === 0) {
        name = pick(SILLY.shortPre) + pick(SILLY.shortSuf);
      } else if (len === 1) {
        name = `${pick(SILLY.medAdj)} ${pick(SILLY.medNoun)}${pick(SILLY.medSuf)}`;
      } else {
        name = `${pick(SILLY.longScale)} ${pick(SILLY.longAdj)} ${pick(SILLY.longNoun)}${pick(SILLY.longSuf)}`;
      }
    } else if (style === 'medium') {
      if (len === 0) {
        name = pick(PLAUSIBLE.shortPre) + pick(PLAUSIBLE.shortSuf);
      } else if (len === 1) {
        const adj = Math.random() < 0.3 ? pick(PLAUSIBLE.medHyphen) : pick(PLAUSIBLE.medSimple);
        name = `${adj} ${pick(PLAUSIBLE.medMod)}${pick(PLAUSIBLE.medType)}`;
      } else {
        if (Math.random() < 0.7) {
          name = `${pick(PLAUSIBLE.longColor)}-${pick(PLAUSIBLE.longPart)} ${pick(PLAUSIBLE.longHab)}${pick(PLAUSIBLE.longType)}`;
        } else {
          name = `${pick(PLAUSIBLE.scale)} ${pick(PLAUSIBLE.longHab)}${pick(PLAUSIBLE.longType)}`;
        }
      }
    } else { // hard
      if (len === 0) {
        // Short: "Color-bodypart Type"  e.g. Rufous-bellied Warbler
        name = `${pick(SNEAKY.color)}-${pick(SNEAKY.bodyPart)} ${pick(SNEAKY.type)}`;
      } else if (len === 1) {
        // Medium: "Scale Color-bodypart Type"  e.g. Lesser Yellow-throated Flycatcher
        name = `${pick(SNEAKY.scale)} ${pick(SNEAKY.color)}-${pick(SNEAKY.bodyPart)} ${pick(SNEAKY.type)}`;
      } else {
        // Long: "Geographic Color-bodypart Type"  e.g. Himalayan Black-crowned Babbler
        name = `${pick(SNEAKY.geo)} ${pick(SNEAKY.color)}-${pick(SNEAKY.bodyPart)} ${pick(SNEAKY.type)}`;
      }
    }
    attempts++;
  } while (usedFakeNames.has(name) && attempts < 100);
  usedFakeNames.add(name);
  console.log('[DEBUG] Generated fake name:', name, '(style:', style + ')');
  lastFakeStyle = style;
  return name;
}

// ── Real bird pool ────────────────────────────────────────────────────────────
// Flat list — startRound() picks 2 at random each game.
const BIRDS = [
  { name: "Magnificent Frigatebird",
    fact: "Males inflate a bright red throat pouch the size of a football to attract mates. They can stay airborne for up to two months straight, sleeping while they glide." },

    fact: "The male sports a crest like a huge black umbrella and a dangling wattle up to 35cm long. He inflates it to boom like a foghorn to attract females." },

    fact: "Found on a single tiny island in Indonesia. The male has bare turquoise skin on its head, a curled blue tail wire, and a cape of yellow and red. The bare scalp acts like a stage light, brightening during courtship." },
  { name: "Spectacled Eider",
    fact: "Winters in enormous Arctic flocks of nearly 400,000 birds on the Bering Sea. They dive through holes in the ice to feed on clams. The male's goggle-like eye patches give it the look of a very stylish diver." },
  { name: "Ribbon-tailed Astrapia",
    fact: "The male has tail feathers over 1 metre long — three times its body length. It's found only in a small part of New Guinea's highlands and the tails are prized as ornaments by local tribes." },

  { name: "Cock-of-the-rock",
    fact: "The male is neon orange and looks like someone glued a UFO to its head. Males gather in groups called leks and show off together — the female wanders through and picks whoever she likes." },

    fact: "Named by British explorers after the 18th-century fashion of wearing extravagant feathered hats. With 18 million individuals it's the world's most numerous penguin — yet most people have never heard of it." },

    fact: "The male is so colourful — blue head, red chest, green back — that it looks like it was painted by a child with every crayon. It's real, but illegal to keep as a pet in the US despite a huge black market." },

    fact: "The only nocturnal fruit-eating bird. Chicks get so fat on palm fruit they can weigh 50% more than their parents. Indigenous people harvested chicks and boiled them down for lamp oil — hence the name." },

    fact: "Can mimic chainsaws, camera shutters, car alarms, and other birds with stunning accuracy. Its full display takes 20 minutes and involves mimicking up to 20 different species in sequence." },

    fact: "Powerful enough to carry off monkeys and sloths. Its talons are the same size as a grizzly bear's claws. Despite being a massive apex predator, it nests in a single tree for years and raises only one chick at a time." },

    fact: "Despite the ominous name, it's a sociable bird that travels in gangs of up to 60. Recent research found they maintain complex social networks — groups that regularly interact but stay distinct, like human communities." },

  { name: "Greater Roadrunner",

  { name: "Puffin",

  { name: "Raggiana Bird-of-Paradise",

  { name: "Andean Condor",

  { name: "Snowy Owl",

  { name: "Rifleman",

  { name: "Limpkin",

  { name: "Red Knot",

  { name: "Black Heron",

  { name: "Maleo",

  { name: "Greater Honeyguide",

  { name: "Andean Flamingo",

  { name: "Splendid Fairywren",

  { name: "Frigatebird",

  { name: "Kiwi",

  { name: "Long-tailed Widowbird",

// ── Photo fetching ───────────────────────────────────────────────────────────
async function fetchBirdPhoto(birdName) {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 6000);
    const res = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(birdName)}`,
      { signal: controller.signal }
    );
    clearTimeout(timeout);
    if (!res.ok) return null;
    const data = await res.json();
    return data.thumbnail?.source ?? null;
  } catch {
    return null;
  }
}

// ── Game state ───────────────────────────────────────────────────────────────
let score = 0, streak = 0, bestStreak = 0;
let currentRound = null, answered = false;
let birdPool = [];   // shuffled indices, refilled when exhausted
let photoPromises = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickTwoBirds() {
  if (birdPool.length < 2) {
    birdPool = shuffle([...Array(BIRDS.length).keys()]);
  }
  return [BIRDS[birdPool.pop()], BIRDS[birdPool.pop()]];
}

function startRound() {
  answered = false;

  const [bird1, bird2] = pickTwoBirds();
  currentRound = { real: [bird1, bird2], fake: generateFakeName() };

  // Kick off photo fetches in background while user is thinking
  photoPromises = currentRound.real.map(b => fetchBirdPhoto(b.name));

  const options = shuffle([
    { name: currentRound.fake, isFake: true },
    { name: currentRound.real[0].name, isFake: false },
    { name: currentRound.real[1].name, isFake: false }
  ]);

  const cards = document.getElementById('bird-cards');
  cards.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'bird-btn';
    btn.dataset.fake = opt.isFake;
    btn.innerHTML = `<div class="bird-name">${opt.name}</div>${opt.isFake ? `<div style="font-size:0.6rem;opacity:0.5;margin-top:2px">[DEBUG style: ${lastFakeStyle}]</div>` : ''}`;
    btn.onclick = () => handleGuess(opt.isFake, opt.name);
    cards.appendChild(btn);
  });

  document.getElementById('result-panel').style.display = 'none';
}

async function handleGuess(pickedFake, pickedName) {
  if (answered) return;
  answered = true;

  if (pickedFake) {
    score++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    streak = 0;
  }

  if (selectedDifficulty === 'auto') updateAdaptiveDifficulty(pickedFake);

  document.getElementById('score').textContent = score;
  document.getElementById('best-streak').textContent = bestStreak;

  document.querySelectorAll('.bird-btn').forEach(btn => {
    btn.disabled = true;
    const isFakeBtn = btn.dataset.fake === 'true';
    const wasClicked = btn.querySelector('.bird-name').textContent === pickedName;
    btn.classList.add(isFakeBtn ? 'reveal-fake' : 'reveal-real');
    btn.innerHTML += `<div class="result-label ${isFakeBtn ? 'label-fake' : 'label-real'}">${isFakeBtn ? '✗ FAKE' : '✓ REAL'}</div>`;
    if (wasClicked && pickedFake)  btn.classList.add('correct');
    if (wasClicked && !pickedFake) btn.classList.add('wrong');
  });

  const header = document.getElementById('result-header');
  header.textContent = pickedFake
    ? (streak >= 3 ? `✓ Correct! 🔥 ${streak} in a row!` : '✓ Correct!')
    : `✗ Nope! The fake was: ${currentRound.fake}`;
  header.className = `result-header ${pickedFake ? 'win' : 'lose'}`;

  // Build result panel with photo placeholders
  const info = document.getElementById('real-birds-info');
  info.innerHTML = '';
  currentRound.real.forEach((bird, i) => {
    const div = document.createElement('div');
    div.className = 'real-bird';
    div.innerHTML = `
      <h3>${bird.name}</h3>
      <div class="photo-wrap" id="photo-wrap-${i}">
        <div class="photo-loading">loading photo…</div>
        <img id="bird-photo-${i}" class="bird-photo" alt="${bird.name}">
      </div>
      <p class="fun-fact">${bird.fact}</p>
    `;
    info.appendChild(div);
  });

  document.getElementById('streak-display').innerHTML =
    streak >= 2 ? `🔥 Current streak: <span>${streak}</span>` : '';

  const panel = document.getElementById('result-panel');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // Resolve photos (likely already fetched while user was thinking)
  const photos = await Promise.all(photoPromises);
  photos.forEach((src, i) => {
    const wrap = document.getElementById(`photo-wrap-${i}`);
    const img  = document.getElementById(`bird-photo-${i}`);
    if (!wrap || !img) return;
    if (src) {
      img.onload  = () => img.classList.add('loaded');
      img.onerror = () => { wrap.style.display = 'none'; };
      img.src = src;
    } else {
      wrap.style.display = 'none';
    }
  });
}

function nextRound() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(startRound, 300);
}

startRound();
</script>
