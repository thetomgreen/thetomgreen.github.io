<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Love Drops — live</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='70' font-size='80' text-anchor='middle'%3E♫%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <header class="topbar">
    <div class="title-wrap">
      <span id="status-dot" class="status-dot" aria-live="polite" title="Connecting…"></span>
      <h1 id="song-title">…</h1>
      <button id="toggle-chords" type="button" aria-pressed="false">Chords</button>
    </div>
    <div class="controls">
      <button id="show-qr" type="button" aria-label="Show QR code to share this link">QR</button>
      <button id="zoom-out" type="button" aria-label="Zoom out">A−</button>
      <button id="zoom-in" type="button" aria-label="Zoom in">A+</button>
    </div>
  </header>

  <main id="scroll-area" class="scroll-area">
    <article id="song-body" class="song-body" aria-live="polite"></article>
    <div id="empty-state" class="empty-state hidden">
      <p>Performer is between songs.</p>
    </div>
    <div id="bottom-spacer" class="bottom-spacer" aria-hidden="true"></div>
  </main>

  <div id="banner" class="banner hidden" role="status" aria-live="polite"></div>

  <!-- QR-share overlay: shows the current page URL so the viewer can
       hand the link to others around them without needing the original
       performer to re-show their QR. Hidden by default. -->
  <div id="qr-overlay" class="qr-overlay hidden" role="dialog" aria-modal="true" aria-label="Share this link">
    <button id="qr-close" type="button" class="qr-close" aria-label="Close">×</button>
    <div class="qr-card">
      <div id="qr-target" class="qr-target"></div>
      <p class="qr-hint">Scan to follow along</p>
      <p id="qr-url" class="qr-url"></p>
    </div>
  </div>

  <!-- Supabase JS client (UMD bundle). Loaded from jsDelivr CDN. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- QR code generator (lazy-loaded on demand by main.js so it doesn't
       cost first-paint for the 99% of viewers who never tap "QR"). -->
  <script src="main.js?v=5"></script>
</body>
</html>
