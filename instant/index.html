<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Love Drops — live</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='70' font-size='80' text-anchor='middle'%3E♫%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="title-wrap">
      <h1 id="song-title">…</h1>
      <span id="status-dot" class="status-dot" aria-live="polite" title="Connecting…"></span>
    </div>
    <div class="controls">
      <button id="toggle-chords" type="button" aria-pressed="false">Chords</button>
      <button id="zoom-out" type="button" aria-label="Zoom out">A−</button>
      <button id="zoom-in" type="button" aria-label="Zoom in">A+</button>
    </div>
  </header>

  <main id="scroll-area" class="scroll-area">
    <article id="song-body" class="song-body" aria-live="polite"></article>
    <div id="bottom-spacer" class="bottom-spacer" aria-hidden="true"></div>
  </main>

  <div id="banner" class="banner hidden" role="status" aria-live="polite"></div>

  <!-- Supabase JS client (UMD bundle). Loaded from jsDelivr CDN. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="main.js"></script>
</body>
</html>
